version: '3.8'

services:
  kittygram:
    image: dkutuzov/kittygram_dkutuzov:latest
    ports:
      - "8000:8000"
    restart: always
    volumes:
      - kittygram_data:/app

  nginx:
    image: nginx:alpine
    ports:
      - "8443:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - kittygram
    restart: always

volumes:
  kittygram_data:


